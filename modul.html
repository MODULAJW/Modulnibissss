<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA TECH V2 - Tersedia Sekarang!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000428 0%, #004e92 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 150, 0.2) 0%, transparent 50%);
            z-index: -1;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            padding: 40px 30px;
            background: rgba(0, 0, 30, 0.7);
            border-radius: 25px;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(0, 150, 255, 0.3);
            border: 1px solid rgba(0, 200, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .container::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffaa, #ffff00);
            z-index: -1;
            border-radius: 27px;
            animation: border-glow 4s linear infinite;
            background-size: 400% 400%;
        }
        
        .title {
            font-size: 5.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            letter-spacing: 3px;
            line-height: 1.1;
            animation: title-glow 3s ease-in-out infinite alternate;
        }
        
        .subtitle {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 50px;
            color: #00ffaa;
            text-shadow: 0 0 20px rgba(0, 255, 170, 0.7);
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }
        
        .subtitle::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
        }
        
        .description {
            font-size: 1.4rem;
            line-height: 1.7;
            margin-bottom: 60px;
            color: #e0f7ff;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            text-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
            padding: 0 20px;
        }
        
        .whatsapp-button {
            display: inline-block;
            padding: 28px 70px;
            background: linear-gradient(45deg, #25D366, #128C7E, #075E54);
            color: white;
            font-size: 2.2rem;
            font-weight: 900;
            text-decoration: none;
            border-radius: 70px;
            text-align: center;
            letter-spacing: 1.5px;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(37, 211, 102, 0.5),
                inset 0 5px 15px rgba(255, 255, 255, 0.3);
            transition: all 0.4s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            z-index: 1;
            animation: button-pulse 2s infinite;
            margin-top: 20px;
            text-transform: uppercase;
        }
        
        .whatsapp-button:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.7),
                0 0 60px rgba(37, 211, 102, 0.8),
                inset 0 5px 20px rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }
        
        .whatsapp-button:active {
            transform: translateY(-3px) scale(1.02);
        }
        
        .whatsapp-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.7s;
            z-index: -1;
        }
        
        .whatsapp-button:hover::before {
            left: 100%;
        }
        
        .whatsapp-button span {
            display: block;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 8px;
            opacity: 0.9;
            letter-spacing: normal;
        }
        
        .floating-text {
            position: absolute;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.5);
            animation: float 6s ease-in-out infinite;
        }
        
        .floating-text:nth-child(1) {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }
        
        .floating-text:nth-child(2) {
            top: 15%;
            right: 8%;
            animation-delay: 1s;
        }
        
        .floating-text:nth-child(3) {
            bottom: 20%;
            left: 10%;
            animation-delay: 2s;
        }
        
        .floating-text:nth-child(4) {
            bottom: 15%;
            right: 5%;
            animation-delay: 3s;
        }
        
        /* Animations */
        @keyframes border-glow {
            0% {
                background-position: 0% 50%;
                opacity: 0.8;
            }
            50% {
                background-position: 100% 50%;
                opacity: 1;
            }
            100% {
                background-position: 0% 50%;
                opacity: 0.8;
            }
        }
        
        @keyframes title-glow {
            0% {
                text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            }
            100% {
                text-shadow: 0 0 50px rgba(0, 255, 255, 0.8), 0 0 70px rgba(255, 0, 255, 0.5);
            }
        }
        
        @keyframes button-pulse {
            0% {
                box-shadow: 
                    0 15px 35px rgba(0, 0, 0, 0.5),
                    0 0 40px rgba(37, 211, 102, 0.5),
                    inset 0 5px 15px rgba(255, 255, 255, 0.3);
            }
            50% {
                box-shadow: 
                    0 15px 40px rgba(0, 0, 0, 0.6),
                    0 0 60px rgba(37, 211, 102, 0.7),
                    inset 0 5px 20px rgba(255, 255, 255, 0.4);
            }
            100% {
                box-shadow: 
                    0 15px 35px rgba(0, 0, 0, 0.5),
                    0 0 40px rgba(37, 211, 102, 0.5),
                    inset 0 5px 15px rgba(255, 255, 255, 0.3);
            }
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .title {
                font-size: 4rem;
            }
            
            .subtitle {
                font-size: 2.2rem;
            }
            
            .description {
                font-size: 1.2rem;
                padding: 0 10px;
            }
            
            .whatsapp-button {
                padding: 22px 50px;
                font-size: 1.8rem;
            }
            
            .container {
                padding: 30px 20px;
            }
        }
        
        @media (max-width: 480px) {
            .title {
                font-size: 3rem;
                letter-spacing: 2px;
            }
            
            .subtitle {
                font-size: 1.8rem;
            }
            
            .description {
                font-size: 1.1rem;
                margin-bottom: 40px;
            }
            
            .whatsapp-button {
                padding: 18px 35px;
                font-size: 1.5rem;
            }
            
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating text elements -->
    <div class="floating-text">🔥 V2 NI BOSSSS</div>
    <div class="floating-text">⚡ VGA MAX ⚡</div>
    <div class="floating-text">🎮 MANTAP NIH 🎮</div>
    <div class="floating-text">💎 KUALITAS PREMIUM 💎</div>
    
    <div class="container">
        <h1 class="title">VGA TECH V2</h1>
        <h2 class="subtitle">SUDAH TERSEDIA</h2>
        
        <p class="description">
            VGA TECH V2 . CUSTOM MODUL 1000 DRAFT, BISA CHATTING SAMA PEMAIN MODUL LAINYYA INI SEPERTI APLIKASI WA!! KERENN
        </p>
        
        <a href="https://wa.me/6289504546082?text=Halo%20Bang%2C%20saya%20mau%20beli%20VGA%20TECH%20V2%20dong%21" class="whatsapp-button">
            BELI SEKARANG
            <span>GASS CUY 12K aja</span>
        </a>
    </div>

    <script>
        // Efek tambahan saat halaman dimuat
        document.addEventListener('DOMContentLoaded', function() {
            const title = document.querySelector('.title');
            const subtitle = document.querySelector('.subtitle');
            const button = document.querySelector('.whatsapp-button');
            
            // Animasi masuk elemen
            title.style.opacity = '0';
            title.style.transform = 'translateY(-30px)';
            
            subtitle.style.opacity = '0';
            subtitle.style.transform = 'translateY(-30px)';
            
            button.style.opacity = '0';
            button.style.transform = 'translateY(30px)';
            
            // Animasikan elemen masuk
            setTimeout(() => {
                title.style.transition = 'opacity 1s ease, transform 1s ease';
                title.style.opacity = '1';
                title.style.transform = 'translateY(0)';
            }, 300);
            
            setTimeout(() => {
                subtitle.style.transition = 'opacity 1s ease, transform 1s ease';
                subtitle.style.opacity = '1';
                subtitle.style.transform = 'translateY(0)';
            }, 800);
            
            setTimeout(() => {
                button.style.transition = 'opacity 1s ease, transform 1s ease';
                button.style.opacity = '1';
                button.style.transform = 'translateY(0)';
            }, 1300);
            
            // Efek klik tombol
            button.addEventListener('click', function(e) {
                // Tambahkan efek klik
                this.style.transform = 'scale(0.95)';
                
                // Kembalikan setelah 150ms
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
                
                // Buka WhatsApp
                const message = "Halo Bang, saya mau beli VGA TECH V2 dong!";
                const phoneNumber = "6289504546082";
                window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
            });
            
            // Efek hover suara (opsional, tidak ada suara asli di kode ini)
            button.addEventListener('mouseenter', function() {
                // Hentikan animasi pulse saat hover
                this.style.animation = 'none';
            });
            
            button.addEventListener('mouseleave', function() {
                // Kembalikan animasi pulse saat mouse keluar
                this.style.animation = 'button-pulse 2s infinite';
            });
        });
    </script>
</body>
  </html>
