<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VGA TECH ADMIN V2</title>
  <!-- INSPECT NYA MASIH ANAK KECIKKK WKWKWK-->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- ANJING -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <!-- NGAPAIN LU LIAT KODINGAN GW IRI BILANG BOS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu-toggle" id="menuToggleBtn">
  <i class="fas fa-bars"></i> MENU
</div>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <h1>VGA TECH</h1>
    <p>MASUKIN MP3 BASURI NYA KESINI SEMUANYA!!</p>
    <div class="badge-premium">
      <i class="fas fa-microchip"></i> SYSTEM v2· LIGHT
    </div>
  </div>
  <div class="nav-links">
    <div class="nav-item active" id="nav-dashboard">
      <i class="fas fa-waveform"></i> <span>Upload Studio</span>
    </div>
    <div class="nav-item" id="nav-stats" style="cursor:default;">
      <i class="fas fa-cloud-upload-alt"></i> <span>Cloud Pipeline</span>
    </div>
  </div>
  <div class="version">
    <i class="fas fa-shield-alt"></i>
  </div>
</aside>

<main class="main">
  
  <div class="premium-card">
    <div class="section-title">
      <i class="fas fa-cloud-upload-alt"></i> 
      <span>UPLOAD MP3 · AUDIO STREAM</span>
    </div>
    <div class="form-group">
      <label><i class="fas fa-tag"></i> NAMA BASURI NYA : </label>
      <input type="text" id="trackName" placeholder="Contoh: VGA Anthem / Neon Pulse" autocomplete="off">
    </div>
    <div class="form-group">
      <label><i class="fas fa-music"></i> masukin basuri nya (MP3)</label>
      <label for="mp3FileInput" class="file-label">
        <i class="fas fa-folder-open"></i> Pilih file Basuri
      </label>
      <input type="file" id="mp3FileInput" accept="audio/mpeg, audio/mp3">
      <div id="fileNameDisplay" class="file-name-hint"></div>
    </div>
    <button class="btn-elegant" id="uploadBtn">
      <i class="fas fa-satellite-dish"></i> KIRIM
    </button>
    <div id="logArea" class="terminal-loader" style="display: none;"></div>
  </div>
  
  
  <div class="empty-info">
    <i class="fas fa-check-circle"></i>
    <p>MASUKIN AJA SEUMUANYA PAL</p>
    <p style="font-size: 0.8rem; margin-top: 8px;">______________________________</p>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
