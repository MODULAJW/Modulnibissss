<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>admin VGA TECH</title>
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
            color: #f0f0f0;
        }

        /* Animated particles background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.02) 0%, rgba(10, 10, 20, 0) 70%);
        }
        .particles::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#0ff 0.6px, transparent 0.6px);
            background-size: 28px 28px;
            opacity: 0.2;
        }

        /* main container */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* glass header */
        .glass-header {
            background: rgba(10, 10, 20, 0.45);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), 0 0 12px rgba(0, 255, 255, 0.2);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .logo-area h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0ff, #a0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .logo-area p {
            font-size: 0.75rem;
            opacity: 0.7;
        }
        .selection-tools {
            display: flex;
            gap: 1rem;
        }

        /* buttons modern */
        .btn-neon {
            background: rgba(0, 20, 30, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 3rem;
            padding: 0.5rem 1.4rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            color: #0ff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-size: 0.9rem;
        }
        .btn-neon:hover {
            transform: scale(1.03);
            background: rgba(0, 255, 255, 0.15);
            border-color: #0ff;
            box-shadow: 0 0 12px #0ff88;
            color: #fff;
        }
        .btn-gradient {
            background: linear-gradient(95deg, #0a0f2a, #0a1a2a);
            border: none;
            border-radius: 3rem;
            padding: 0.75rem 1.6rem;
            font-weight: 600;
            color: white;
            gap: 10px;
            box-shadow: 0 0 5px cyan;
            transition: 0.25s;
        }
        .btn-gradient:hover {
            background: linear-gradient(95deg, #0ff, #a0f);
            box-shadow: 0 0 18px #0ff, 0 0 5px #a0f;
            transform: scale(1.02);
        }
        .btn-danger {
            border-color: #ff3366;
            color: #ff88aa;
        }
        .btn-danger:hover {
            background: rgba(255, 51, 102, 0.25);
            border-color: #ff3366;
            box-shadow: 0 0 12px #ff3366;
        }

        /* form glass card */
        .form-card {
            background: rgba(15, 15, 25, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5), 0 0 12px rgba(0,255,255,0.2);
            transition: 0.2s;
        }
        .form-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.4rem;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .input-icon {
            flex: 1;
            min-width: 180px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-radius: 3rem;
            border: 1px solid rgba(0,255,255,0.3);
            transition: 0.2s;
        }
        .input-icon:focus-within {
            border-color: #0ff;
            box-shadow: 0 0 10px #0ff66;
        }
        .input-icon span {
            margin: 0 12px;
            color: #0ff;
        }
        .input-icon input {
            background: transparent;
            border: none;
            padding: 0.9rem 0.8rem 0.9rem 0;
            width: 100%;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }
        /* user grid */
        .stats-badge {
            font-size: 0.8rem;
            background: rgba(0,255,255,0.2);
            border-radius: 2rem;
            padding: 0.2rem 1rem;
        }
        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .user-card {
            background: rgba(12, 12, 20, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1.2rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.5, 1.1);
            position: relative;
            cursor: pointer;
        }
        .user-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: #0ff;
            box-shadow: 0 15px 30px -12px rgba(0, 255, 255, 0.3), 0 0 0 1px rgba(0,255,255,0.4);
        }
        .card-check {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 5;
        }
        .card-check .material-symbols-rounded {
            font-size: 24px;
            color: #0ff;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
        }
        .card-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 10px;
        }
        .icon-btn {
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 20px;
        }
        .icon-btn:hover {
            background: rgba(255, 51, 102, 0.8);
            transform: scale(1.1);
        }
        .user-info {
            margin-top: 32px;
        }
        .user-name {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            background: rgba(0,0,0,0.5);
        }
        .status-active {
            color: #0ff;
            border-left: 2px solid #0ff;
        }
        .status-inactive {
            color: #aaa;
        }

        /* modal glass premium */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-glass {
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            max-width: 480px;
            width: 90%;
            padding: 2rem;
            border: 1px solid rgba(0,255,255,0.5);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 35px rgba(0,255,255,0.3);
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .modal-glass h3 {
            font-size: 1.7rem;
            margin-bottom: 1rem;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        /* toast */
        .toast-notif {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(0, 30, 30, 0.9);
            backdrop-filter: blur(12px);
            border-left: 4px solid #0ff;
            border-radius: 1rem;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            z-index: 1100;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            font-weight: 500;
        }
        .toast-notif.show {
            transform: translateX(0);
        }
        .loader-sm {
            width: 20px;
            height: 20px;
            border: 2px solid #0ff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .glass-header { flex-direction: column; gap: 1rem; align-items: start; }
        }
    </style>
</head>
<body>
<div class="particles"></div>
<div class="app-container">
    <div class="glass-header">
        <div class="logo-area">
            <h1>◈ ADMIN VGA TECH</h1>
            <p>FIREWALL ADMIN · Aris</p>
        </div>
        <div class="selection-tools">
            <button id="enableSelectBtn" class="btn-neon"><span class="material-symbols-rounded">check_box_outline_blank</span> Pilih</button>
            <button id="deleteSelectedBtn" class="btn-neon btn-danger"><span class="material-symbols-rounded">delete</span> Hapus Terpilih</button>
            <button id="deleteAllBtn" class="btn-neon btn-danger"><span class="material-symbols-rounded">delete_forever</span> Hapus Semua</button>
        </div>
    </div>

    <!-- Form Tambah User -->
    <div class="form-card">
        <div class="form-title">
            <span class="material-symbols-rounded" style="color:#0ff">person_add</span>
            <span>Tambah Akses User</span>
        </div>
        <div class="input-group">
            <div class="input-icon"><span class="material-symbols-rounded">person</span><input type="text" id="username" placeholder="Username" autocomplete="off"></div>
            <div class="input-icon"><span class="material-symbols-rounded">lock</span><input type="text" id="password" placeholder="Password"></div>
            <div class="input-icon"><span class="material-symbols-rounded">schedule</span><input type="number" id="duration" placeholder="Durasi (hari)" value="7"></div>
            <button id="addUserBtn" class="btn-neon btn-gradient"><span class="material-symbols-rounded">add</span> Tambahkan User</button>
        </div>
    </div>

    <!-- User Monitoring + Grid -->
    <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 1rem;">
        <h3 style="display: flex; gap: 10px;"><span class="material-symbols-rounded">devices</span> Database Users <span id="userCount" class="stats-badge">0</span></h3>
        <span style="font-size: 0.75rem; opacity: 0.6;">↻ live sync | klik card → detail</span>
    </div>
    <div id="usersGrid" class="user-grid">
        <div style="grid-column:1/-1; text-align:center; padding:3rem;">Memuat data secure...</div>
    </div>
</div>

<!-- Modal Detail -->
<div id="detailModal" class="modal-overlay">
    <div class="modal-glass">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3><span class="material-symbols-rounded">visibility</span> Detail Credential</h3>
            <span id="closeModalBtn" class="material-symbols-rounded" style="cursor:pointer; background:#111; border-radius: 50%; padding: 6px;">close</span>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<!-- Toast Container -->
<div id="toastMsg" class="toast-notif"><span class="material-symbols-rounded">verified</span><span id="toastText">Sukses</span></div>

<script>
    // Firebase init
    const firebaseConfig = {
        apiKey: "AIzaSyDHSWmNFH0M2xxAHscSaVf5S8EbGecLzh4",
        authDomain: "vga-tech-v2-88b79.firebaseapp.com",
        projectId: "vga-tech-v2-88b79",
        storageBucket: "vga-tech-v2-88b79.firebasestorage.app",
        messagingSenderId: "736275916549",
        appId: "1:736275916549:web:31d62d90aad3c1f2adf96c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const usersCollection = db.collection("users");

    // Global state
    let allUsers = [];
    let selectionMode = false;
    let selectedUsersSet = new Set(); // simpan document id

    // DOM elements
    const usersGrid = document.getElementById("usersGrid");
    const addBtn = document.getElementById("addUserBtn");
    const usernameInp = document.getElementById("username");
    const passwordInp = document.getElementById("password");
    const durationInp = document.getElementById("duration");
    const enableSelectBtn = document.getElementById("enableSelectBtn");
    const deleteSelectedBtn = document.getElementById("deleteSelectedBtn");
    const deleteAllBtn = document.getElementById("deleteAllBtn");
    const userCountSpan = document.getElementById("userCount");
    const modalOverlay = document.getElementById("detailModal");
    const modalContent = document.getElementById("modalContent");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const toastEl = document.getElementById("toastMsg");
    const toastTextSpan = document.getElementById("toastText");

    function showToast(message, type = "success") {
        toastTextSpan.innerText = message;
        toastEl.classList.add("show");
        setTimeout(() => toastEl.classList.remove("show"), 2800);
    }

    function showLoading(btn, isLoading, originalText) {
        if(isLoading) {
            btn.disabled = true;
            btn.innerHTML = `<span class="loader-sm"></span> Memproses...`;
        } else {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

    // reset selection mode
    function resetSelectionMode() {
        selectionMode = false;
        selectedUsersSet.clear();
        renderUsersGrid();
        enableSelectBtn.innerHTML = `<span class="material-symbols-rounded">check_box_outline_blank</span> Pilih`;
    }

    // render dengan checkboxes jika mode selection aktif
    function renderUsersGrid() {
        if(!allUsers.length) {
            usersGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem; background:rgba(0,0,0,0.3); border-radius:2rem;">✨ Tidak ada user. Tambahkan user baru ✨</div>`;
            userCountSpan.innerText = "0";
            return;
        }
        userCountSpan.innerText = allUsers.length;
        let html = '';
        allUsers.forEach(user => {
            const docId = user.id;
            const data = user.data;
            const isActive = data.deviceId && data.deviceId !== null;
            const statusText = isActive ? "Aktif" : "Belum digunakan";
            const statusIcon = isActive ? "check_circle" : "hourglass_empty";
            const checked = selectedUsersSet.has(docId);
            html += `
                <div class="user-card" data-id="${docId}">
                    ${selectionMode ? `
                        <div class="card-check" data-checkbox-stop>
                            <span class="material-symbols-rounded" data-select-icon="${docId}" style="font-variation-settings:'FILL' ${checked ? 1 : 0};">${checked ? "check_box" : "check_box_outline_blank"}</span>
                        </div>
                    ` : ''}
                    <div class="card-actions">
                        <span class="material-symbols-rounded icon-btn" data-delete-single="${docId}" style="color:#ff7b89;">delete</span>
                    </div>
                    <div class="user-info">
                        <div class="user-name"><span class="material-symbols-rounded">badge</span> ${escapeHtml(data.username)}</div>
                        <div style="margin: 10px 0; display:flex; gap:8px; flex-wrap:wrap;"><span class="status-badge ${isActive ? 'status-active' : 'status-inactive'}"><span class="material-symbols-rounded" style="font-size:14px;">${statusIcon}</span> ${statusText}</span>
                        <span><span class="material-symbols-rounded" style="font-size:16px;">schedule</span> ${data.duration} hari</span></div>
                        <div style="font-size:0.75rem; opacity:0.6;">🖥️ ${data.deviceId ? data.deviceId.substring(0,12)+".." : "—"}</div>
                    </div>
                </div>
            `;
        });
        usersGrid.innerHTML = html;
        // attach event listeners card klik untuk detail (kecuali checkbox atau tombol hapus)
        document.querySelectorAll('.user-card').forEach(card => {
            const cardId = card.getAttribute('data-id');
            card.addEventListener('click', (e) => {
                // jika target adalah area checkbox atau icon delete, jangan buka modal
                if(e.target.closest('[data-checkbox-stop]') || e.target.closest('[data-delete-single]')) return;
                const userFound = allUsers.find(u => u.id === cardId);
                if(userFound) openDetailModal(userFound);
            });
        });
        // event delete single
        document.querySelectorAll('[data-delete-single]').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const docId = btn.getAttribute('data-delete-single');
                if(confirm("Hapus user ini secara permanen?")) {
                    try {
                        await usersCollection.doc(docId).delete();
                        showToast("User dihapus", "success");
                    } catch(err) { showToast("Error: "+err.message, "error"); }
                }
            });
        });
        // jika mode selection, tambahkan event pada icon select
        if(selectionMode) {
            document.querySelectorAll('[data-select-icon]').forEach(icon => {
                icon.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const docId = icon.getAttribute('data-select-icon');
                    if(selectedUsersSet.has(docId)) {
                        selectedUsersSet.delete(docId);
                    } else {
                        selectedUsersSet.add(docId);
                    }
                    renderUsersGrid();
                });
            });
        }
    }

    function openDetailModal(userObj) {
        const d = userObj.data;
        const start = d.startTime ? new Date(d.startTime.toDate ? d.startTime.toDate() : d.startTime).toLocaleString() : "Belum mulai";
        modalContent.innerHTML = `
            <div class="detail-row"><strong>Username</strong> <span>${escapeHtml(d.username)}</span></div>
            <div class="detail-row"><strong>Password</strong> <span>${escapeHtml(d.password)}</span></div>
            <div class="detail-row"><strong>Durasi</strong> <span>${d.duration} hari</span></div>
            <div class="detail-row"><strong>Start Time</strong> <span>${start}</span></div>
            <div class="detail-row"><strong>Device ID</strong> <span>${d.deviceId || "❌ null / belum terdaftar"}</span></div>
        `;
        modalOverlay.classList.add('active');
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}

    // realtime onSnapshot
    function subscribeUsers() {
        usersCollection.orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            const usersArray = [];
            snapshot.forEach(doc => {
                usersArray.push({ id: doc.id, data: doc.data() });
            });
            allUsers = usersArray;
            // hapus id yang sudah tidak ada dari selected set
            const existingIds = new Set(usersArray.map(u => u.id));
            for(let sid of selectedUsersSet) {
                if(!existingIds.has(sid)) selectedUsersSet.delete(sid);
            }
            renderUsersGrid();
        }, (error) => {
            console.error(error);
            showToast("Gagal sync realtime", "error");
        });
    }

    // tambah user
    async function addUser() {
        const username = usernameInp.value.trim();
        const password = passwordInp.value.trim();
        const duration = parseInt(durationInp.value);
        if(!username || !password) { showToast("Username & password wajib diisi!", "error"); return; }
        if(isNaN(duration) || duration <= 0) { showToast("Durasi harus angka positif", "error"); return; }
        const originalBtnHtml = addBtn.innerHTML;
        showLoading(addBtn, true, "");
        try {
            await usersCollection.add({
                username: username,
                password: password,
                duration: duration,
                startTime: null,
                deviceId: null,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast(`User ${username} berhasil ditambahkan`, "success");
            usernameInp.value = "";
            passwordInp.value = "";
            durationInp.value = "7";
            resetSelectionMode();
        } catch(err) {
            showToast("Gagal: "+err.message, "error");
        } finally {
            showLoading(addBtn, false, `<span class="material-symbols-rounded">add</span> Tambahkan User`);
        }
    }

    // hapus selected (massal)
    async function deleteSelected() {
        if(selectedUsersSet.size === 0) {
            showToast("Tidak ada user yang dipilih", "error");
            return;
        }
        const confirmDel = confirm(`Hapus ${selectedUsersSet.size} user terpilih? Tindakan permanen.`);
        if(!confirmDel) return;
        const batch = db.batch();
        for(let id of selectedUsersSet) {
            const ref = usersCollection.doc(id);
            batch.delete(ref);
        }
        try {
            await batch.commit();
            showToast(`${selectedUsersSet.size} user telah dihapus.`, "success");
            selectedUsersSet.clear();
            if(selectionMode) resetSelectionMode();
        } catch(e) { showToast("Gagal batch delete: "+e.message, "error"); }
    }

    async function deleteAllUsers() {
        const doubleConfirm = confirm("⚠️ PERINGATAN AKHIR: Hapus SEMUA user dari database? ⚠️");
        if(!doubleConfirm) return;
        const finalConfirm = confirm("Ya, saya yakin ingin MENGHAPUS TOTAL SEMUA DATA. Tidak dapat dikembalikan.");
        if(!finalConfirm) return;
        try {
            const snapshot = await usersCollection.get();
            if(snapshot.empty) { showToast("Tidak ada data untuk dihapus", "info"); return; }
            const batch = db.batch();
            snapshot.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            showToast("Semua user telah dihapus total", "success");
            resetSelectionMode();
        } catch(e) { showToast("Error saat hapus semua: "+e.message, "error"); }
    }

    // enable selection mode
    function enableSelection() {
        selectionMode = true;
        selectedUsersSet.clear();
        renderUsersGrid();
        enableSelectBtn.innerHTML = `<span class="material-symbols-rounded">check_box</span> Mode Pilih Aktif`;
        // setelah 3 detik mungkin kembali? tapi user bisa nonaktifkan
        setTimeout(() => {
            if(selectionMode) {
                // optional reset after 20 detik? lebih baik tambah tombol cancel? tapi kita tambah fitur jika klik lagi cancel
            }
        },100);
    }
    // cancel selection by click same button?
    enableSelectBtn.addEventListener('click', () => {
        if(selectionMode) {
            resetSelectionMode();
        } else {
            enableSelection();
        }
    });
    deleteSelectedBtn.addEventListener('click', deleteSelected);
    deleteAllBtn.addEventListener('click', deleteAllUsers);
    addBtn.addEventListener('click', addUser);
    closeModalBtn.addEventListener('click', () => modalOverlay.classList.remove('active'));
    modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) modalOverlay.classList.remove('active'); });
    
    // start realtime
    subscribeUsers();

    // handle enter key
    const inputs = [usernameInp, passwordInp, durationInp];
    inputs.forEach(inp => inp.addEventListener('keypress', (e) => { if(e.key === 'Enter') addUser(); }));
</script>
</body>
</html>
