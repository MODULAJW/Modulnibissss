<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VGA TECH ADMIN | Audio Control System</title>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Firebase CDN (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      font-family: 'Inter', sans-serif;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    /* custom scroll - refined */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* SIDEBAR - premium light glassmorphism */
    .sidebar {
      width: 280px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: 4px 0 24px rgba(0, 0, 0, 0.02);
      padding: 2rem 1.2rem;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .brand {
      margin-bottom: 2.5rem;
      border-left: 4px solid #3b82f6;
      padding-left: 1rem;
    }
    .brand h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #1e293b, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #475569;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }
    .badge-premium {
      background: #eef2ff;
      border: 1px solid #cbd5e1;
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.7rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      width: fit-content;
      color: #1e40af;
    }
    .badge-premium i {
      color: #3b82f6;
      font-size: 0.8rem;
    }

    .nav-links {
      margin-top: 2rem;
      flex: 1;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin-bottom: 10px;
      border-radius: 16px;
      background: rgba(241, 245, 249, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
      transition: all 0.2s ease;
      cursor: default;
      font-weight: 600;
      color: #1e293b;
    }
    .nav-item i {
      font-size: 1.2rem;
      color: #3b82f6;
    }
    .nav-item span {
      font-size: 0.9rem;
      letter-spacing: 0.3px;
    }
    .nav-item.active {
      background: #ffffff;
      border-color: #3b82f6;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.12);
    }

    .version {
      font-family: monospace;
      font-size: 0.7rem;
      text-align: center;
      color: #64748b;
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
      margin-top: 20px;
    }

    /* MAIN CONTENT */
    .main {
      margin-left: 280px;
      flex: 1;
      padding: 2rem 2rem 2rem 2rem;
      width: calc(100% - 280px);
      transition: all 0.2s;
    }

    /* PREMIUM CARD - clean light style */
    .premium-card {
      background: #ffffff;
      border-radius: 32px;
      padding: 1.8rem;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(148, 163, 184, 0.1);
      transition: all 0.2s ease;
    }
    .premium-card:hover {
      box-shadow: 0 20px 32px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(59, 130, 246, 0.2);
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 4px solid #3b82f6;
      padding-left: 18px;
      color: #0f172a;
    }
    .section-title i {
      color: #3b82f6;
      font-size: 1.4rem;
    }

    /* form group */
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      font-weight: 600;
      letter-spacing: 0.3px;
      display: block;
      margin-bottom: 8px;
      color: #334155;
      font-size: 0.85rem;
    }
    input {
      width: 100%;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      padding: 12px 18px;
      color: #0f172a;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      background: #ffffff;
    }
    .file-label {
      background: #f1f5f9;
      border: 1.5px dashed #94a3b8;
      border-radius: 24px;
      padding: 12px 20px;
      display: inline-block;
      width: 100%;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
      color: #334155;
    }
    .file-label:hover {
      background: #eef2ff;
      border-color: #3b82f6;
      color: #1e40af;
    }
    input[type="file"] {
      display: none;
    }

    /* elegant button */
    .btn-elegant {
      background: linear-gradient(90deg, #1e293b, #0f172a);
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    .btn-elegant:hover {
      background: linear-gradient(90deg, #2d3a4f, #1e293b);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }
    .btn-elegant:active {
      transform: translateY(1px);
    }

    /* terminal loader - light modern */
    .terminal-loader {
      font-family: 'JetBrains Mono', monospace;
      background: #f1f5f9;
      padding: 14px 20px;
      border-radius: 24px;
      font-size: 0.85rem;
      color: #0f3b5c;
      border-left: 4px solid #3b82f6;
      margin-top: 18px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
    }
    .blink {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ========= REMOVED DATABASE PREVIEW SECTION ========= */
    /* Tidak ada lagi "DATABASE · AUDIO STREAM" atau pratinjau list audio */
    /* Halaman hanya menampilkan form upload dan log sukses */
    
    .empty-info {
      text-align: center;
      padding: 32px 20px;
      background: #f8fafc;
      border-radius: 28px;
      margin-top: 20px;
      border: 1px solid #e2e8f0;
    }
    .empty-info i {
      font-size: 2.5rem;
      color: #94a3b8;
      margin-bottom: 12px;
    }
    .empty-info p {
      color: #475569;
      font-weight: 500;
    }

    /* Success toast / floating effect */
    .toast-success {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #10b981;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
      z-index: 1000;
      animation: slideUp 0.3s ease;
      font-size: 0.85rem;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* responsive */
    @media (max-width: 850px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.mobile-open {
        transform: translateX(0);
      }
      .main {
        margin-left: 0;
        width: 100%;
        padding: 1.2rem;
      }
      .menu-toggle {
        display: block;
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 200;
        background: white;
        backdrop-filter: blur(8px);
        border: 1px solid #cbd5e1;
        border-radius: 30px;
        padding: 10px 18px;
        color: #1e293b;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      }
    }
    .menu-toggle {
      display: none;
    }
    
    .file-name-hint {
      font-size: 0.75rem;
      margin-top: 8px;
      color: #5b6e8c;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>

<div class="menu-toggle" id="menuToggleBtn">
  <i class="fas fa-bars"></i> MENU
</div>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <h1>VGA TECH</h1>
    <p>ADMIN // AUDIO CONTROL</p>
    <div class="badge-premium">
      <i class="fas fa-microchip"></i> SYSTEM v3.0 · LIGHT
    </div>
  </div>
  <div class="nav-links">
    <div class="nav-item active" id="nav-dashboard">
      <i class="fas fa-waveform"></i> <span>Upload Studio</span>
    </div>
    <div class="nav-item" id="nav-stats" style="cursor:default;">
      <i class="fas fa-cloud-upload-alt"></i> <span>Cloud Pipeline</span>
    </div>
  </div>
  <div class="version">
    <i class="fas fa-shield-alt"></i> FIREBASE • CLOUDINARY
  </div>
</aside>

<main class="main">
  <!-- Upload Section - Premium, Clean, Tanpa List Audio -->
  <div class="premium-card">
    <div class="section-title">
      <i class="fas fa-cloud-upload-alt"></i> 
      <span>Panel Admin VGA TECH</span>
    </div>
    <div class="form-group">
      <label><i class="fas fa-tag"></i> TRACK NAME</label>
      <input type="text" id="trackName" placeholder="Contoh: VGA Anthem / Neon Pulse" autocomplete="off">
    </div>
    <div class="form-group">
      <label><i class="fas fa-music"></i> AUDIO FILE (MP3)</label>
      <label for="mp3FileInput" class="file-label">
        <i class="fas fa-folder-open"></i> Pilih file audio
      </label>
      <input type="file" id="mp3FileInput" accept="audio/mpeg, audio/mp3">
      <div id="fileNameDisplay" class="file-name-hint"></div>
    </div>
    <button class="btn-elegant" id="uploadBtn">
      <i class="fas fa-satellite-dish"></i>KIRIM
    </button>
    <div id="logArea" class="terminal-loader" style="display: none;"></div>
  </div>
  
  <!-- Informasi ringkas: Tidak ada list / preview database audio stream -->
  <div class="empty-info">
    <i class="fas fa-check-circle"></i>
    <p>MASUKIN AJA SEMUANYA PAL NANTI KE KIRIM KE APK KITA</p>
    <p style="font-size: 0.8rem; margin-top: 8px;">____________________________</p>
  </div>
</main>

<script>
  // ========================= FIREBASE CONFIG (ISI SENDIRI) =========================
  const firebaseConfig = {apiKey: "AIzaSyDFqgav7NPOkS2u_AE1Ai1am0nA1sTtSJc",
    authDomain: "server-vga-broo.firebaseapp.com",
    projectId: "server-vga-broo",
    storageBucket: "server-vga-broo.firebasestorage.app",
    messagingSenderId: "822866912257",
    appId: "1:822866912257:web:a7866373ec6028541d4c00"
  };
  // =================================================================================
  
  // Inisialisasi Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  
  // Cloudinary config
  const CLOUD_NAME = "duh8ofg5n";   // bisa disesuaikan nanti
  const UPLOAD_PRESET = "ml_default"; // unsigned preset untuk auto/upload
  const CLOUDINARY_UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;
  
  // DOM Elements
  const uploadBtn = document.getElementById('uploadBtn');
  const trackNameInput = document.getElementById('trackName');
  const mp3FileInput = document.getElementById('mp3FileInput');
  const fileNameDisplay = document.getElementById('fileNameDisplay');
  const logArea = document.getElementById('logArea');
  
  mp3FileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      fileNameDisplay.innerHTML = `<i class="fas fa-check-circle" style="color:#10b981;"></i> ${e.target.files[0].name}`;
    } else {
      fileNameDisplay.innerHTML = '';
    }
  });
  
  // Terminal style log (modern light)
  function showTerminalLog(messages, isError = false) {
    logArea.style.display = 'block';
    let html = `<i class="fas fa-terminal"></i> > `;
    if (Array.isArray(messages)) {
      html += messages.map(m => `<span style="color:${isError ? '#dc2626' : '#2563eb'}">${m}</span>`).join('<br> > ');
    } else {
      html += `<span style="color:${isError ? '#dc2626' : '#2563eb'}">${messages}</span>`;
    }
    logArea.innerHTML = html + `<span class="blink">_</span>`;
    if (isError) {
      setTimeout(() => {
        if(logArea && logArea.style.display !== 'none') {
          setTimeout(() => { if(logArea) logArea.style.display = 'none'; }, 3500);
        }
      }, 4000);
    }
  }
  
  function clearLogAfterDelay(delay = 2800) {
    setTimeout(() => {
      if (logArea) logArea.style.display = 'none';
    }, delay);
  }
  
  function showSuccessToast(message) {
    const existing = document.querySelector('.toast-success');
    if(existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-success';
    toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  // Upload ke Cloudinary
  async function uploadToCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);
    formData.append('resource_type', 'auto');
    
    const response = await fetch(CLOUDINARY_UPLOAD_URL, {
      method: 'POST',
      body: formData
    });
    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error?.message || `Upload gagal (${response.status})`);
    }
    const data = await response.json();
    console.log("[DEBUG] Cloudinary response:", data);
    if (!data.secure_url) throw new Error("secure_url tidak ditemukan dari Cloudinary");
    return data.secure_url;
  }
  
  // Simpan ke Firestore
  async function saveToFirestore(trackName, audioUrl) {
    const docRef = await db.collection("mp3_list").add({
      name: trackName,
      url: audioUrl,
      created_at: Date.now()
    });
    console.log("[DEBUG] Firestore ID:", docRef.id);
    return docRef.id;
  }
  
  // Proses utama upload
  async function handleUpload() {
    const file = mp3FileInput.files[0];
    if (!file) {
      showTerminalLog("❌ Pilih file MP3 terlebih dahulu.", true);
      return;
    }
    if (file.type !== "audio/mpeg" && !file.name.toLowerCase().endsWith('.mp3')) {
      showTerminalLog("⚠️ Hanya file MP3 yang didukung.", true);
      return;
    }
    
    let trackName = trackNameInput.value.trim();
    if (trackName === "") {
      trackName = file.name.replace(/\.mp3$/i, '').replace(/\.MP3$/i, '');
      trackNameInput.value = trackName;
    }
    
    // Disable tombol
    uploadBtn.disabled = true;
    uploadBtn.style.opacity = '0.7';
    const originalText = uploadBtn.innerHTML;
    uploadBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> PROSES...';
    
    try {
      showTerminalLog(["⟳ Mengupload ke Cloudinary...", `  track: ${trackName}`, `  ukuran: ${(file.size / 1024).toFixed(1)} KB`]);
      
      const audioUrl = await uploadToCloudinary(file);
      console.log("[CLOUDINARY URL]", audioUrl);
      showTerminalLog(["✓ Upload Cloudinary sukses!", "⟳ Mengambil URL aman...", `🔗 ${audioUrl.substring(0, 65)}...`]);
      
      showTerminalLog(["⟳ Mengirim ke Database Firestore...", "  koleksi: mp3_list"]);
      await saveToFirestore(trackName, audioUrl);
      
      showTerminalLog(["✨ Sukses! Audio tersimpan di database.", "📡 Data telah dikirim ke sistem VGA TECH."]);
      showSuccessToast(`"${trackName}" berhasil diupload!`);
      clearLogAfterDelay(3000);
      
      // Reset form
      mp3FileInput.value = '';
      fileNameDisplay.innerHTML = '';
      trackNameInput.value = '';
      
    } catch (error) {
      console.error("[ERROR UPLOAD]", error);
      showTerminalLog(`⚠️ Gagal: ${error.message}`, true);
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.style.opacity = '1';
      uploadBtn.innerHTML = originalText;
    }
  }
  
  uploadBtn.addEventListener('click', handleUpload);
  
  // Sidebar mobile toggles
  const sidebar = document.getElementById('sidebar');
  const menuToggle = document.getElementById('menuToggleBtn');
  function closeSidebar() { if(window.innerWidth <= 850) sidebar.classList.remove('mobile-open'); }
  function toggleMobileSidebar() {
    if(window.innerWidth <= 850) {
      sidebar.classList.toggle('mobile-open');
    }
  }
  menuToggle?.addEventListener('click', toggleMobileSidebar);
  document.addEventListener('click', (e) => {
    if(window.innerWidth <= 850 && sidebar.classList.contains('mobile-open') && !sidebar.contains(e.target) && e.target !== menuToggle && !menuToggle.contains(e.target)) {
      closeSidebar();
    }
  });
  
  // Nav dummy (hanya UI)
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
      item.classList.add('active');
      if(window.innerWidth <= 850) closeSidebar();
    });
  });
  
  // Inisialisasi (tidak ada listener database karena tidak perlu menampilkan list)
  function init() {
    console.log("VGA TECH ADMIN | Light mode • No audio preview list • Firebase + Cloudinary ready");
    // Opsional: test koneksi Firestore (hanya untuk debugging)
    db.collection("mp3_list").limit(1).get().catch(e => console.warn("Firestore check:", e.message));
  }
  
  init();
</script>
</body>
</html>
