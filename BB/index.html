    .badge-premium {

    /* MAIN CONTENT */
    .main {
      margin-left: 280px;

    /* PREMIUM CARD - clean light style */
    .premium-card {

    .section-title {

    /* form group */

    }
    label {
      font-weight: 600;
      letter-spacing: 0.3px;
      display: block;

    }
    input {
      width: 100%;

    /* elegant button */

    /* terminal loader - light modern */
    .terminal-loader {

      padding: 14px 20px;
      border-radius: 24px;

      border-left: 4px solid #3b82f6;

    }
    .blink {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    /* batch progress bar premium */
    .batch-progress {
      background: #eef2ff;
      border-radius: 20px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 0.85rem;

    .progress-stats span {
      background: white;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.8rem;

    .progress-bar-bg {
      flex: 1;
      height: 8px;
      background: #cbd5e1;
      border-radius: 20px;
      overflow: hidden;
      min-width: 150px;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: #3b82f6;
      border-radius: 20px;
      transition: width 0.2s ease;
    }
    
    .empty-info {
      text-align: center;
      padding: 32px 20px;
      background: #f8fafc;
      border-radius: 28px;

    .empty-info i {

    }

    /* Success toast */
    .toast-success {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #10b981;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);

      animation: slideUp 0.3s ease;
      font-size: 0.85rem;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }

    /* responsive */
    @media (max-width: 850px) {
      .sidebar {
        transform: translateX(-100%);
      }

      }
      .main {

        padding: 1.2rem;
      }
      .menu-toggle {
        display: block;

        left: 20px;
        z-index: 200;

        border: 1px solid #cbd5e1;
        border-radius: 30px;
        padding: 10px 18px;
        color: #1e293b;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      }
    }
    .menu-toggle {
      display: none;
    }
    
    .file-name-hint {
      font-size: 0.75rem;
      margin-top: 10px;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: #f8fafc;
      padding: 10px;
      border-radius: 20px;
    }
    .file-badge {
      background: #e2e8f0;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }
    .file-counter {
      background: #3b82f6;
      color: white;
      border-radius: 40px;
      padding: 2px 12px;
      font-size: 0.7rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="menu-toggle" id="menuToggleBtn">
  <i class="fas fa-bars"></i> MENU
</div>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <h1>VGA TECH</h1>
    <p>ADMIN // BULK UPLOAD</p>
    <div class="badge-premium">

<main class="main">
  <div class="premium-card">

    </div>
    <div class="form-group">

<script>
  // ========================= FIREBASE CONFIG =========================
  const firebaseConfig = {
    apiKey: "AIzaSyDFqgav7NPOkS2u_AE1Ai1am0nA1sTtSJc",
    authDomain: "server-vga-broo.firebaseapp.com",
    projectId: "server-vga-broo",
    storageBucket: "server-vga-broo.firebasestorage.app",
    messagingSenderId: "822866912257",
    appId: "1:822866912257:web:a7866373ec6028541d4c00"
  };
  // ====================================================================
  
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  
  const CLOUD_NAME = "duh8ofg5n";
  const UPLOAD_PRESET = "ml_default";
  const CLOUDINARY_UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;
  
  // DOM elements
  const uploadBtn = document.getElementById('uploadBtn');
  const clearBtn = document.getElementById('clearBtn');
  const trackNameInput = document.getElementById('trackName');
  const mp3FileInput = document.getElementById('mp3FileInput');
  const fileNameDisplay = document.getElementById('fileNameDisplay');
  const logArea = document.getElementById('logArea');
  const progressPanel = document.getElementById('progressPanel');
  const progressCountSpan = document.getElementById('progressCount');
  const totalFilesSpan = document.getElementById('totalFilesCount');
  const successCountSpan = document.getElementById('successCount');
  const failCountSpan = document.getElementById('failCount');
  const progressFill = document.getElementById('progressFill');
  
  let currentUploadActive = false;
  let abortController = null;
  
  // Display list file yang dipilih
  mp3FileInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    if (files.length > 0) {
      let html = `<i class="fas fa-list-ul"></i> <span class="file-counter">${files.length} file</span> dipilih: `;
      const maxShow = 6;
      const showFiles = files.slice(0, maxShow);
      showFiles.forEach((f, idx) => {
        html += `<span class="file-badge"><i class="fas fa-music"></i> ${f.name.length > 28 ? f.name.substring(0,25)+'...' : f.name}</span>`;
        if (idx < showFiles.length - 1) html += ' ';
      });
      if (files.length > maxShow) html += `<span class="file-badge">+${files.length - maxShow} lainnya</span>`;
      fileNameDisplay.innerHTML = html;
    } else {
      fileNameDisplay.innerHTML = '';
    }
    // reset log jika ganti file
    if (!currentUploadActive) {
      clearLogUI();
      progressPanel.style.display = 'none';
    }
  });
  
  function clearLogUI() {
    logArea.style.display = 'none';
    logArea.innerHTML = '';
  }
  
  function appendLog(message, isError = false) {
    logArea.style.display = 'block';
    const msgSpan = document.createElement('div');
    msgSpan.style.marginBottom = '6px';
    msgSpan.style.wordBreak = 'break-word';
    msgSpan.style.color = isError ? '#dc2626' : '#1e40af';
    msgSpan.innerHTML = `<i class="fas ${isError ? 'fa-times-circle' : 'fa-arrow-right'}"></i> ${message}`;
    logArea.appendChild(msgSpan);
    logArea.scrollTop = logArea.scrollHeight;
  }
  
  function resetProgressDisplay() {
    successCountSpan.innerText = '0';
    failCountSpan.innerText = '0';
    progressCountSpan.innerText = '0';
    progressFill.style.width = '0%';
  }
  
  function showSuccessToast(message) {
    const existing = document.querySelector('.toast-success');
    if(existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-success';
    toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3200);
  }
  
  // Upload ke Cloudinary menggunakan fetch dengan timeout
  async function uploadToCloudinary(file, signal) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);
    formData.append('resource_type', 'auto');
    
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 60000); // 60 detik timeout
    
    try {
      const response = await fetch(CLOUDINARY_UPLOAD_URL, {
        method: 'POST',
        body: formData,
        signal: signal || controller.signal
      });
      clearTimeout(timeoutId);
      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP ${response.status}`);
      }
      const data = await response.json();
      if (!data.secure_url) throw new Error("No secure_url");
      return data.secure_url;
    } catch (err) {
      clearTimeout(timeoutId);
      throw err;
    }
  }
  
  async function saveToFirestore(trackName, audioUrl) {
    const docRef = await db.collection("mp3_list").add({
      name: trackName,
      url: audioUrl,
      created_at: Date.now(),
      upload_batch: Date.now()
    });
    return docRef.id;
  }
  
  // Fungsi upload batch dengan concurrency terkontrol (antrian maks 3 paralel)
  async function processBatch(files, baseTrackName, onProgress, signal) {
    const results = { success: 0, failed: 0, errors: [] };
    let completed = 0;
    const total = files.length;
    
    // Queue dengan batas paralel 3 (agar stabil dan tidak overload)
    const CONCURRENCY = 3;
    const queue = [...files];
    const workers = [];
    
    const processFile = async (file, index) => {
      if (signal && signal.aborted) return;
      let trackName = baseTrackName;
      if (baseTrackName === "") {
        trackName = file.name.replace(/\.mp3$/i, '').replace(/\.MP3$/i, '');
      } else {
        trackName = total > 1 ? `${baseTrackName}_${index+1}` : baseTrackName;
      }
      
      try {
        appendLog(`[${index+1}/${total}] ⬆ Upload: "${file.name.substring(0, 40)}" → ${trackName}`, false);
        const audioUrl = await uploadToCloudinary(file, signal);
        await saveToFirestore(trackName, audioUrl);
        results.success++;
        appendLog(`[${index+1}/${total}] ✅ BERHASIL: ${trackName}`, false);
      } catch (err) {
        results.failed++;
        results.errors.push(`${file.name}: ${err.message}`);
        appendLog(`[${index+1}/${total}] ❌ GAGAL: ${file.name} - ${err.message}`, true);
      }
      
      completed++;
      if (onProgress) onProgress(completed, total, results.success, results.failed);
    };
    
    for (let i = 0; i < files.length; i++) {
      if (signal && signal.aborted) break;
      const worker = processFile(files[i], i).then(() => {
        // hapus dari workers setelah selesai
        const idx = workers.indexOf(worker);
        if (idx !== -1) workers.splice(idx, 1);
      });
      workers.push(worker);
      if (workers.length >= CONCURRENCY) {
        await Promise.race(workers);
      }
    }
    await Promise.all(workers);
    return results;
  }
  
  async function handleUpload() {
    if (currentUploadActive) {
      appendLog("⚠️ Upload sedang berjalan, harap tunggu selesai.", true);
      return;
    }
    const files = Array.from(mp3FileInput.files);
    if (files.length === 0) {
      appendLog("❌ Pilih minimal satu file MP3 terlebih dahulu.", true);
      return;
    }
    for (let f of files) {
      if (!f.type.includes("audio/mpeg") && !f.name.toLowerCase().endsWith('.mp3')) {
        appendLog(`❌ File "${f.name}" bukan MP3. Hentikan proses.`, true);
        return;
      }
    }
    
    // Siapkan UI
    currentUploadActive = true;
    abortController = new AbortController();
    uploadBtn.disabled = true;
    clearBtn.disabled = true;
    uploadBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> MENGIRIM MASSAL...';
    clearLogUI();
    progressPanel.style.display = 'block';
    resetProgressDisplay();
    totalFilesSpan.innerText = files.length;
    const baseTrackInput = trackNameInput.value.trim();
    
    appendLog(`🚀 MEMULAI UPLOAD MASSAL: ${files.length} file dengan concurrency 3 paralel`, false);
    appendLog(`📦 Nama dasar track: ${baseTrackInput === "" ? "(auto dari nama file)" : baseTrackInput}`, false);
    
    const updateProgress = (completed, total, success, failed) => {
      progressCountSpan.innerText = completed;
      successCountSpan.innerText = success;
      failCountSpan.innerText = failed;
      const percent = (completed / total) * 100;
      progressFill.style.width = `${percent}%`;
    };
    
    const startTime = Date.now();
    const result = await processBatch(files, baseTrackInput, updateProgress, abortController.signal);
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    
    if (abortController.signal.aborted) {
      appendLog(`⚠️ Upload dibatalkan oleh pengguna.`, true);
      showSuccessToast("Upload dibatalkan.");
    } else {
      if (result.success > 0) {
        appendLog(`✨ SELESAI! Berhasil: ${result.success} file, Gagal: ${result.failed} file. Waktu: ${elapsed} detik.`, false);
        showSuccessToast(`${result.success} file berhasil diupload!`);
      } else {
        appendLog(`❌ Gagal total. Tidak ada file yang terupload.`, true);
      }
      if (result.errors.length > 0 && result.errors.length <= 8) {
        appendLog(`⚠️ Rincian error:`, true);
        result.errors.forEach(err => appendLog(`   ↪ ${err.substring(0, 120)}`, true));
      } else if (result.errors.length > 8) {
        appendLog(`⚠️ Terdapat ${result.errors.length} error. Cek console untuk detail.`, true);
      }
    }
    
    // Reset form setelah selesai (opsional: reset file input)
    mp3FileInput.value = '';
    fileNameDisplay.innerHTML = '';
    if (files.length > 0 && baseTrackInput !== "") {
      // Kosongkan hanya jika user mengisi dan tidak dalam mode massal biar gak ganggu, tapi optional
      if (files.length === 1) trackNameInput.value = '';
    }
    currentUploadActive = false;
    uploadBtn.disabled = false;
    clearBtn.disabled = false;
    uploadBtn.innerHTML = '<i class="fas fa-satellite-dish"></i>UPLOAD SEMUA FILE';
    abortController = null;
    
    // Sembunyikan progress panel setelah 5 detik jika tidak diperlukan (tetap tampilkan)
    setTimeout(() => {
      if (!currentUploadActive) {
        // keep visible but user can clear later
      }
    }, 1000);
  }
  
  function resetFormAndLogs() {
    if (currentUploadActive) {
      if (abortController) {
        abortController.abort();
        appendLog("🛑 Membatalkan proses upload yang sedang berjalan...", true);
        currentUploadActive = false;
        uploadBtn.disabled = false;
        clearBtn.disabled = false;
        uploadBtn.innerHTML = '<i class="fas fa-satellite-dish"></i>UPLOAD SEMUA FILE';
      }
      return;
    }
    mp3FileInput.value = '';
    fileNameDisplay.innerHTML = '';
    trackNameInput.value = '';
    clearLogUI();
    progressPanel.style.display = 'none';
    resetProgressDisplay();
    appendLog("🧹 Form & log telah dibersihkan. Siap upload baru.", false);
    setTimeout(() => {
      if (logArea.innerText.includes("dibersihkan")) {
        logArea.style.display = 'none';
      }
    }, 1500);
  }
  
  uploadBtn.addEventListener('click', handleUpload);
  clearBtn.addEventListener('click', resetFormAndLogs);
  
  // Sidebar mobile toggles
  const sidebar = document.getElementById('sidebar');
  const menuToggle = document.getElementById('menuToggleBtn');
  function closeSidebar() { if(window.innerWidth <= 850) sidebar.classList.remove('mobile-open'); }
  function toggleMobileSidebar() {
    if(window.innerWidth <= 850) sidebar.classList.toggle('mobile-open');
  }
  menuToggle?.addEventListener('click', toggleMobileSidebar);
  document.addEventListener('click', (e) => {
    if(window.innerWidth <= 850 && sidebar.classList.contains('mobile-open') && !sidebar.contains(e.target) && e.target !== menuToggle && !menuToggle.contains(e.target)) {
      closeSidebar();
    }
  });
  
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
      item.classList.add('active');
      if(window.innerWidth <= 850) closeSidebar();
    });
  });
  
  function init() {
    console.log("VGA TECH MEGA BATCH UPLOAD ACTIVE - support ratusan file dengan antrian cerdas");
    db.collection("mp3_list").limit(1).get().catch(e => console.warn("Firestore check:", e.message));
  }
  init();
</script>
</body>
</html>
