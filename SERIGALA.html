<style>

:root{
--cyan:#00E5FF;
--yellow:#FFD600;
--dark:#0F1115;
--card:#171A21;
--white:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Space Grotesk',sans-serif;
}

body{
background:var(--dark);
overflow:hidden;
color:white;
}

.grid{
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(0,229,255,.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,229,255,.08) 1px, transparent 1px);
background-size:50px 50px;
animation:gridMove 15s linear infinite;
z-index:-5;
}

@keyframes gridMove{
from{
transform:translate(0,0);
}
to{
transform:translate(50px,50px);
}
}

/* ==========================
MEMEK
========================== */

.glow1,
.glow2{
position:fixed;
width:350px;
height:350px;
border-radius:50%;
filter:blur(120px);
opacity:.15;
z-index:-4;
}

.glow1{
background:var(--cyan);
top:-100px;
left:-100px;
animation:moveGlow1 8s ease-in-out infinite;
}

.glow2{
background:var(--yellow);
bottom:-100px;
right:-100px;
animation:moveGlow2 10s ease-in-out infinite;
}

@keyframes moveGlow1{
50%{
transform:translate(100px,50px);
}
}

@keyframes moveGlow2{
50%{
transform:translate(-100px,-50px);
}
}


.floating{
position:fixed;
inset:0;
overflow:hidden;
pointer-events:none;
z-index:-3;
}

.floating span{
position:absolute;
border:2px solid rgba(255,214,0,.25);
background:rgba(0,229,255,.05);
animation:floatUp linear infinite;
}

.floating span:nth-child(1){
width:80px;
height:80px;
left:10%;
animation-duration:20s;
}

.floating span:nth-child(2){
width:120px;
height:120px;
left:30%;
animation-duration:25s;
animation-delay:-5s;
}

.floating span:nth-child(3){
width:60px;
height:60px;
left:50%;
animation-duration:18s;
}

.floating span:nth-child(4){
width:150px;
height:150px;
left:70%;
animation-duration:30s;
}

.floating span:nth-child(5){
width:100px;
height:100px;
left:90%;
animation-duration:22s;
}

@keyframes floatUp{
0%{
transform:translateY(120vh) rotate(0deg);
}
100%{
transform:translateY(-200px) rotate(360deg);
}
}


#splash{
position:fixed;
inset:0;
background:linear-gradient(135deg,var(--cyan),var(--yellow));
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#splash img{
width:180px;
height:180px;
object-fit:cover;
border-radius:40px;
background:white;
box-shadow:
12px 12px 0 black,
0 0 50px rgba(255,255,255,.4);

animation:splashAnim 5s forwards;
}

@keyframes splashAnim{

0%{
opacity:0;
transform:scale(.5) rotate(-10deg);
}

20%{
opacity:1;
transform:scale(1.1) rotate(0deg);
}

80%{
opacity:1;
transform:scale(1);
}

100%{
opacity:0;
transform:scale(1.4);
}
}

/* ==========================
MAIN
========================== */

#main{
display:none;
width:100%;
height:100vh;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:450px;

background:var(--card);
border:4px solid white;

border-radius:28px;

padding:30px;

box-shadow:
12px 12px 0 var(--cyan),
24px 24px 0 var(--yellow);

animation:floatCard 5s ease-in-out infinite;
}

@keyframes floatCard{
50%{
transform:translateY(-10px);
}
}

.apk-image{
display:flex;
justify-content:center;
margin-bottom:25px;
}

.apk-image img{
width:180px;
height:180px;
border-radius:40px;
object-fit:cover;
border:5px solid white;

box-shadow:
0 0 40px rgba(0,229,255,.4),
0 0 80px rgba(255,214,0,.2);
}

.badge{
display:inline-block;
background:var(--yellow);
color:black;
font-weight:800;
padding:8px 15px;
border-radius:12px;
margin-bottom:15px;
}

h1{
font-size:34px;
font-weight:800;
margin-bottom:10px;
}

.desc{
opacity:.8;

.download-btn{
width:100%;

justify-content:center;

background:var(--cyan);

text-decoration:none;

border-radius:18px;
border:3px solid black;

box-shadow:8px 8px 0 var(--yellow);

transition:.25s;

.download-btn:hover{

.info{

.contact{

cursor:pointer;

}

.contact:hover{

.material-symbols-rounded{

color:var(--yellow);
}

.footer{

text-align:center;
opacity:.6;
font-size:13px;

@media(max-width:500px){

height:160px;

font-size:28px;
}

}

</style>
