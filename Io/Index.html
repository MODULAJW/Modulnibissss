<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GlowCheck SEBERAPA CANTIK DAN TAMVAN</title>
  <!-- Google Fonts + Google Material Icons (Terbaik & Paling Keren) -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
  <!-- Cloudinary Upload Widget (silent) -->
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  <!-- Hubungkan CSS Eksternal -->
  <link rel="stylesheet" href="Ceksyantikgyuss.css">
</head>
<body>

<div class="super-card">
  <div class="header-glow">
    <h1>
      <span class="material-icons">auto_awesome</span> GlowCheck
    </h1>
    <div class="subhead">
      <span class="material-icons-outlined">psychology_alt</span> AI Kecantikan & Ketampanan
      <span class="material-icons">stars</span>
    </div>
  </div>

  <div class="camera-zone">
    <div class="cam-wrapper">
      <video id="videoInput" autoplay playsinline muted></video>
      <canvas id="canvasOutput" width="800" height="600"></canvas>
      <div class="badge-hd">
        <span class="material-icons">high_quality</span> HD · Tanpa Mirror
      </div>
    </div>
    <div class="action-buttons">
      <button id="startCamBtn" class="btn-premium"><span class="material-icons">cameraswitch</span> Hidupkan Kamera</button>
      <button id="captureSelfieBtn" class="btn-premium"><span class="material-icons">camera_alt</span> Jepret Selfie</button>
    </div>
  </div>

  <button id="cekSkorBtn" class="btn-asik">
    <span class="material-icons">grading</span> CEK SKOR GLOW
  </button>

  <!-- Hasil CEPAT: Skor % kecantikan/ketampanan + kata kata asik -->
  <div id="hasilArea" class="result-panel-asik hidden">
    <div class="score-big">
      <span class="score-number" id="nilaiSkor">--</span><span class="percent-sign">%</span>
      <div class="label-glow">GLOW LEVEL</div>
    </div>
    <div id="kataKataAsik" class="verdict-asik">
      <span class="material-icons">mood</span> <span id="teksVerdict">---</span>
    </div>
  </div>

  <div class="footer-sans">
    <span class="material-icons-outlined">verified</span> AI impression · hasil seru & akurat
    <span class="material-icons">sentiment_satisfied_alt</span>
  </div>
</div>

<!-- Hubungkan JavaScript Eksternal -->
<script src="Cektamvangyuss.js"></script>
</body>
</html>
